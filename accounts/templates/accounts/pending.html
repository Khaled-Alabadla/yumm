{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Request Pending — Yumm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
</head>
<body class="font-['Inter'] min-h-screen flex items-center justify-center"
  style="background: var(--background); color: var(--text-primary)">
  <div class="text-center max-w-sm px-6">
    <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5"
      style="background: var(--secondary-bg); border: 1px solid var(--border)">
      <i class="fa-solid fa-clock-rotate-left text-2xl" style="color: var(--primary)"></i>
    </div>
    <h1 class="text-2xl font-extrabold mb-2">Request Submitted</h1>
    <p class="text-sm mb-6" style="color: var(--text-secondary)">
      Your restaurant registration is under review. We'll notify you by email once it's approved.
    </p>
    <a href="{% url 'accounts:login' %}"
      class="text-sm font-semibold px-6 py-2.5 rounded-xl text-white inline-block"
      style="background: var(--primary)">
      Back to Login
    </a>
  </div>
  <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
