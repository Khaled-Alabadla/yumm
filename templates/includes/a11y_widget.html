{% load i18n %}
<!-- Floating accessibility button -->
<button
  type="button"
  onclick="openA11y()"
  class="fixed bottom-6 start-6 z-50 w-14 h-14 bg-[#B5451B] hover:bg-[#9A3A16] text-white rounded-full shadow-[0_8px_28px_rgba(181,69,27,.5)] flex md:hidden items-center justify-center transition-all hover:scale-110 focus:outline-none focus:ring-4 focus:ring-[#B5451B]/40"
  aria-label="{% trans 'Open accessibility settings' %}"
  aria-haspopup="dialog"
>
  <i data-lucide="accessibility" class="w-6 h-6"></i>
</button>

<div
  id="a11y-widget"
  role="dialog"
  aria-modal="true"
  aria-label="{% trans 'Accessibility settings' %}"
  onclick="if(event.target===this)closeA11y()"
>
  <div
    id="a11y-panel-inner"
    class="w-full max-w-[340px] h-auto max-h-[90vh] bg-white dark:bg-[#1E1E1E] flex flex-col overflow-hidden shadow-2xl rounded-2xl m-auto"
  >
    <div class="bg-[#B5451B] text-white px-5 py-4 flex items-center justify-between shrink-0">
      <h2 class="font-semibold text-[15px]">{% trans "Accessibility settings" %}</h2>
      <button
        type="button"
        onclick="closeA11y()"
        class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors"
        aria-label="{% trans 'Close' %}"
      >
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
      <div class="bg-[#F7F7F7] dark:bg-[#2A2A2A] rounded-2xl p-4">
        <div class="flex items-center gap-2 text-sm font-semibold text-gray-700 dark:text-gray-200 mb-2">
          <i data-lucide="a-large-small" class="w-4 h-4"></i>
          {% trans "Text size" %}
        </div>
        <div class="stepper">
          <button type="button" onclick="changeFont(-2)" aria-label="{% trans 'Decrease font size' %}">−</button>
          <span id="font-val" data-default-label="{% trans 'Default' %}">{% trans "Default" %}</span>
          <button type="button" onclick="changeFont(2)" aria-label="{% trans 'Increase font size' %}">+</button>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-2">
        <button
          type="button"
          onclick="toggleClass('hc-mode')"
          class="a11y-opt flex flex-col items-center gap-1.5 p-3 rounded-xl bg-[#F7F7F7] dark:bg-[#2A2A2A] hover:border-[#B5451B] border-2 border-transparent transition-colors text-xs font-semibold text-gray-600 dark:text-gray-300"
        >
          <i data-lucide="circle-half-stroke" class="w-5 h-5"></i>
          {% trans "High contrast" %}
        </button>
        <button
          type="button"
          onclick="toggleClass('stop-anim')"
          class="a11y-opt flex flex-col items-center gap-1.5 p-3 rounded-xl bg-[#F7F7F7] dark:bg-[#2A2A2A] hover:border-[#B5451B] border-2 border-transparent transition-colors text-xs font-semibold text-gray-600 dark:text-gray-300"
        >
          <i data-lucide="zap-off" class="w-5 h-5"></i>
          {% trans "Stop animations" %}
        </button>
        <button
          type="button"
          onclick="toggleTheme(); closeA11y()"
          class="a11y-opt flex flex-col items-center gap-1.5 p-3 rounded-xl bg-[#F7F7F7] dark:bg-[#2A2A2A] hover:border-[#B5451B] border-2 border-transparent transition-colors text-xs font-semibold text-gray-600 dark:text-gray-300"
        >
          <i data-lucide="moon" class="w-4 h-4"></i>
          {% trans "Dark mode" %}
        </button>
      </div>

      <button
        type="button"
        onclick="resetAllA11y()"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl border-2 border-[#E8E8E8] dark:border-[#3A3A3A] hover:border-[#B5451B] text-sm font-semibold text-[#B5451B] transition-colors"
      >
        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        {% trans "Reset settings" %}
      </button>
    </div>
  </div>
</div>
